<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>System Scan</title>

<style>
body{
    background:black;
    color:#00ff00;
    font-family:monospace;
    text-align:center;
    padding-top:80px;
}

#bar{
    width:0%;
    height:25px;
    background:#00ff00;
    margin:auto;
}

#container{
    width:70%;
    border:2px solid #00ff00;
    margin:auto;
}

img{
    display:none;
    width:300px;
    margin-top:30px;
}
</style>
</head>

<body>

<h1>Scanning Device...</h1>
<p id="text">Initializing...</p>

<div id="container">
<div id="bar"></div>
</div>

<img id="monkey" src="https://i.imgur.com/8Km9tLL.png">

<script>
let progress = 0;
let bar = document.getElementById("bar");
let text = document.getElementById("text");

let messages = [
"Accessing system files...",
"Bypassing security...",
"Collecting memes...",
"Uploading bananas...",
"Almost done..."
];

let i = 0;

let interval = setInterval(() => {
progress += 2;
bar.style.width = progress + "%";

if(progress % 20 === 0 && i < messages.length){
text.innerText = messages[i];
i++;
}

if(progress >= 100){
clearInterval(interval);
document.body.style.background="purple";
document.body.style.color="white";
document.querySelector("h1").innerText="YOU HAVE BEEN MONKEY'D 🐒";
text.style.display="none";
document.getElementById("monkey").style.display="block";
}
},100);
</script>

</body>
</html>
